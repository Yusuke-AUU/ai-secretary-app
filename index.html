<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>経営相談室 | AUU</title>
  <meta
    name="description"
    content="歩美とのり子が、経営者の悩みや課題を壁打ちしながら整理する会話型の経営相談室です。"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="chat-home">
  <div class="page-glow page-glow-left"></div>
  <div class="page-glow page-glow-right"></div>

  <button
    id="chatLauncher"
    class="chat-launcher" hidden
    type="button"
    aria-controls="chatBox"
    aria-expanded="false"
  >
    経営相談室をひらく
  </button>

  <section id="chatBox" class="chat-box" aria-label="経営相談室">
    <header class="chat-header">
      <div class="chat-header-main">
        <img id="headerAvatar" class="header-avatar" src="ayumi.png" alt="" />
        <div class="chat-header-text">
          <div id="headerTitle" class="chat-header-title">経営相談室</div>
          <div id="headerSubtitle" class="chat-header-subtitle">
            相談相手を選んでください
          </div>
        </div>
      </div>
      <button id="chatClose" class="chat-close" type="button" aria-label="閉じる">×</button>
    </header>

    <div id="chatBody" class="chat-body"></div>

    <form id="chatComposer" class="chat-composer" autocomplete="off">
      <textarea
        id="chatInput"
        class="chat-input"
        rows="1"
        placeholder="気になっていることを入力してください"
      ></textarea>
      <button id="sendButton" class="send-button" type="submit">送信する</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
